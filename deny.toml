# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/checks/

[licenses]
# Allow permissive licenses used by ZeroZero and its dependencies.
# Licenses not in this list are denied by default.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[bans]
# Warn on duplicate versions (common in large dep trees)
multiple-versions = "warn"
# Wildcard deps: path deps in workspace have no version — allow them
wildcards = "allow"
allow-wildcard-paths = true

[sources]
# Only allow crates from crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
