# cargo-deny configuration — ZeroZero
# Verified 2026-07-05: cargo-deny 0.19.9
# Docs: https://embarkstudios.github.io/cargo-deny/checks/

[licenses]
# Allow permissive licenses used by ZeroZero and its dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
# Deny copyleft licenses (incompatible with MIT project)
deny = [
    "GPL-2.0",
    "GPL-2.0-with-classpath-exception",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]
confidence-threshold = 0.8

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
ignore = []

[bans]
# Warn on duplicate versions (common in large dep trees)
multiple-versions = "warn"
# Deny wildcard deps (e.g. "regex = *")
wildcards = "deny"
# Allow build-only deps to duplicate
allow-build-scripts = true

[sources]
# Only allow crates from crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
