name: Supply Chain Audit

# cargo-deny: license + advisory + ban checks
# cargo-audit: RUSTSEC vulnerability audit
#
# Verified 2026-07-05: cargo-deny 0.19.9, cargo-audit 0.22.2
# Runs on every push, PR, and weekly schedule.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Weekly Sunday

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deny-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny (licenses + advisories + bans)
        run: cargo deny check

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: audit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit
